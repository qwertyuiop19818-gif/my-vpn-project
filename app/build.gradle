plugins {
    id 'com.android.application'
}

android {
    namespace 'com.my.vkturn.vpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.my.vkturn.vpn"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // Базовые библиотеки Android, чтобы проект скомпилировался
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
